<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>Quản lý mô bệnh học</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            padding-left: env(safe-area-inset-left, 0);
            padding-right: env(safe-area-inset-right, 0);
            padding-bottom: env(safe-area-inset-bottom, 0);
            background: #f8f8f8;
            min-height: 100vh;
            -webkit-text-size-adjust: 100%;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px #0001;
            padding: 24px;
        }
        h1 {
            color: #880088;
            margin-bottom: 24px;
        }
        .home-button {
            display: inline-block;
            padding: 8px 15px;
            background-color: #f0f0f0;
            color: #333;
            text-decoration: none;
            border-radius: 4px;
            border: 1px solid #ccc;
            margin: 5px 0 15px 0;
            font-weight: bold;
            cursor: pointer;
        }
        .home-button:hover {
            background-color: #e0e0e0;
        }
        .copy-hint {
            margin-top: 8px;
            font-size: 0.9em;
            color: #555;
        }

        /* Kẻ bảng giống trang mẫu */
        #pathologyTable {
            border-collapse: collapse;
            width: 100%;
        }
        #pathologyTable th,
        #pathologyTable td {
            border: 1px solid #ccc;
            padding: 6px 8px;
        }

        /* Tô màu các nút hành động */
        .actions {
            text-align: center;
            background: #880088;
        }
        .actions .btn {
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            margin: 0 2px;
            cursor: pointer;
            font-size: 14px;
            background: #ffc107; /* vàng cho nút sửa/lưu */
            color: #000;
        }
        .actions .btn.btn-secondary {
            background: #6c757d; /* xám cho hủy */
            color: #fff;
        }
        .actions .btn.btn-danger {
            background: #dc3545; /* đỏ cho xóa */
            color: #fff;
        }

        /* Highlight hàng vừa copy */
        .copy-highlight {
            background: #fff3cd !important;
            transition: background 0.3s ease;
        }

        /* ========== Responsive: Tablet & Smartphone ========== */
        .pathology-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 0 -10px;
            padding: 0 10px;
        }
        @media (max-width: 1024px) {
            .container {
                margin: 12px auto;
                padding: 18px;
                max-width: 100%;
            }
            h1 { font-size: 1.25rem; margin-bottom: 16px; }
            #pathologyTable { font-size: 0.9em; }
            #pathologyTable th, #pathologyTable td { padding: 8px 6px; }
        }
        @media (max-width: 768px) {
            .container {
                margin: 10px;
                padding: 14px;
                border-radius: 6px;
            }
            h1 { font-size: 1.1rem; margin-bottom: 12px; }
            .home-button {
                padding: 10px 16px;
                min-height: 44px;
                font-size: 14px;
            }
            #pathologyTable { font-size: 0.85em; min-width: 500px; }
            #pathologyTable th, #pathologyTable td { padding: 6px 4px; }
            .actions .btn {
                padding: 8px 10px;
                min-height: 40px;
                font-size: 13px;
            }
            div[style*="display:flex"][style*="flex-wrap"] {
                flex-direction: column !important;
            }
            div[style*="min-width:220px"] { min-width: 100% !important; }
            div[style*="min-width:260px"] { min-width: 100% !important; }
        }
        @media (max-width: 480px) {
            .container { margin: 8px; padding: 12px; }
            h1 { font-size: 1rem; }
            #pathologyTable { font-size: 0.8em; min-width: 450px; }
        }
    </style>
</head>
<body>
<div class="container">
    <button class="home-button" onclick="window.location.href='hosobenhnhan.html'">⬅️ Quay lại Hồ Sơ Bệnh Án</button>
    <h1>Quản lý danh mục xét nghiệm mô bệnh học</h1>
    <p class="copy-hint">
        
    </p>
    <div id="pathologyBody">
        Đang tải danh mục mô bệnh học...
    </div>
</div>

<script>
// Dữ liệu mô bệnh học (loai, maSo, tenDichVu, gia) - đồng bộ server giống tab Mã ICD
const PATHOLOGY_STORAGE_KEY = 'pathologyData';
let pathoData = [];
let editingIndex = null;

function formatPrice(price) {
    const n = parseInt(price, 10) || 0;
    return new Intl.NumberFormat('vi-VN').format(n);
}

function copyRow(idx) {
    const row = pathoData[idx];
    if (!row) return;
    const text = `${row.maSo} - ${row.tenDichVu} (${row.loai}, giá ${formatPrice(row.gia)} VNĐ)`;
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
            const tr = document.querySelector(`#pathologyTable tbody tr[data-index="${idx}"]`);
            if (tr) {
                tr.classList.add('copy-highlight');
                setTimeout(() => tr.classList.remove('copy-highlight'), 1500);
            }
        }).catch(() => fallbackCopy(text, idx));
    } else {
        fallbackCopy(text, idx);
    }
}

function fallbackCopy(text, idx) {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const tr = document.querySelector(`#pathologyTable tbody tr[data-index="${idx}"]`);
    if (tr) {
        tr.classList.add('copy-highlight');
        setTimeout(() => tr.classList.remove('copy-highlight'), 1500);
    }
}

function renderPathologyTable(filterText = '') {
    const tbody = document.querySelector('#pathologyTable tbody');
    if (!tbody) return;
    const search = (filterText || '').toLowerCase();
    tbody.innerHTML = '';

    pathoData.forEach((row, idx) => {
        if (
            search &&
            !(
                (row.loai || '').toLowerCase().includes(search) ||
                (row.maSo || '').toLowerCase().includes(search) ||
                (row.tenDichVu || '').toLowerCase().includes(search)
            )
        ) {
            return;
        }

        const tr = document.createElement('tr');
        tr.dataset.index = idx;

        if (editingIndex === idx) {
            tr.innerHTML = `
                <td>${idx + 1}</td>
                <td><input id="editLoai" value="${row.loai || ''}" style="width:100%;"></td>
                <td><input id="editMaSo" value="${row.maSo || ''}" style="width:100%;"></td>
                <td><input id="editTenDichVu" value="${row.tenDichVu || ''}" style="width:100%;"></td>
                <td><input id="editGia" type="number" min="0" step="1000" value="${row.gia || 0}" style="width:100%; text-align:right;"></td>
                <td class="actions">
                    <button class="btn" onclick="saveEdit(${idx})">💾</button>
                    <button class="btn btn-secondary" onclick="cancelEdit()">❌</button>
                </td>
            `;
        } else {
            tr.innerHTML = `
                <td>${idx + 1}</td>
                <td>${row.loai}</td>
                <td>${row.maSo}</td>
                <td>${row.tenDichVu}</td>
                <td style="text-align:right;">${formatPrice(row.gia)}</td>
                <td class="actions">
                    <button class="btn" onclick="editRow(${idx}); event.stopPropagation();">✏️</button>
                    <button class="btn btn-danger" onclick="deleteRow(${idx}); event.stopPropagation();">🗑️</button>
                </td>
            `;
        }

        tbody.appendChild(tr);
    });
}

function editRow(idx) {
    editingIndex = idx;
    renderPathologyTable(document.getElementById('pathologySearch')?.value || '');
}

function cancelEdit() {
    editingIndex = null;
    renderPathologyTable(document.getElementById('pathologySearch')?.value || '');
}

function saveEdit(idx) {
    const loaiEl = document.getElementById('editLoai');
    const maSoEl = document.getElementById('editMaSo');
    const tenEl = document.getElementById('editTenDichVu');
    const giaEl = document.getElementById('editGia');
    if (!loaiEl || !maSoEl || !tenEl || !giaEl) return;

    pathoData[idx] = {
        loai: loaiEl.value.trim(),
        maSo: maSoEl.value.trim(),
        tenDichVu: tenEl.value.trim(),
        gia: parseInt(giaEl.value, 10) || 0,
    };
    editingIndex = null;
    renderPathologyTable(document.getElementById('pathologySearch')?.value || '');
    persistPathology();
}

function deleteRow(idx) {
    if (!confirm('Bạn có chắc chắn muốn xóa dịch vụ này? Dữ liệu sẽ tự động đồng bộ lên server.')) return;
    pathoData.splice(idx, 1);
    if (editingIndex === idx) editingIndex = null;
    renderPathologyTable(document.getElementById('pathologySearch')?.value || '');
    persistPathology();
}

function addNewPathology() {
    const loaiEl = document.getElementById('newLoai');
    const maSoEl = document.getElementById('newMaSo');
    const tenEl = document.getElementById('newTenDichVu');
    const giaEl = document.getElementById('newGia');
    if (!loaiEl || !maSoEl || !tenEl || !giaEl) return;

    const loai = loaiEl.value.trim();
    const maSo = maSoEl.value.trim();
    const ten = tenEl.value.trim();
    const gia = parseInt(giaEl.value, 10) || 0;

    if (!loai || !maSo || !ten || !gia) {
        alert('Vui lòng nhập đầy đủ Loại bệnh phẩm, Mã số, Tên dịch vụ và Giá.');
        return;
    }

    // Kiểm tra trùng mã số trong danh sách hiện tại
    if (pathoData.some(row => (row.maSo || '').toLowerCase() === maSo.toLowerCase())) {
        alert('Mã số này đã tồn tại trong danh sách.');
        return;
    }

    pathoData.push({ loai, maSo, tenDichVu: ten, gia });

    // Xóa form nhập
    loaiEl.value = '';
    maSoEl.value = '';
    tenEl.value = '';
    giaEl.value = '';

    renderPathologyTable(document.getElementById('pathologySearch')?.value || '');
    persistPathology();
}

// Đồng bộ mô bệnh học lên server (yêu cầu đăng nhập - JWT)
function persistPathology() {
    const data = pathoData || [];
    try {
        localStorage.setItem(PATHOLOGY_STORAGE_KEY, JSON.stringify(data));
    } catch (e) {
        console.warn('Không lưu được pathology vào localStorage:', e);
    }
    const headers = { 'Content-Type': 'application/json' };
    const token = localStorage.getItem('authToken');
    if (token) headers['Authorization'] = 'Bearer ' + token;
    fetch('/api/pathology/export', {
        method: 'PUT',
        headers: headers,
        body: JSON.stringify(data),
    }).then(r => {
        if (r.ok) {
            console.log('✅ Đã đồng bộ mô bệnh học lên server.');
        } else if (r.status === 401) {
            alert('Phiên đăng nhập hết hạn. Vui lòng đăng nhập tại trang chủ.');
            window.location.href = '/';
        }
    }).catch(err => {
        console.error('Lỗi khi đồng bộ mô bệnh học lên server:', err);
    });
}

function buildPathologyUI(target) {
    target.innerHTML = `
        <div style="margin-bottom: 16px;">
            <input id="pathologySearch" type="text" placeholder="Tìm kiếm..." style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        </div>
        <div style="margin-bottom: 12px; display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end;">
            <div style="flex:1; min-width:220px;">
                <label style="font-weight:bold; display:block; margin-bottom:4px;">Loại bệnh phẩm</label>
                <input id="newLoai" type="text" placeholder="Nhập tên loại bệnh phẩm" style="width:100%; padding:6px 8px; border:1px solid #ccc; border-radius:4px;">
            </div>
            <div style="width:180px;">
                <label style="font-weight:bold; display:block; margin-bottom:4px;">Mã số</label>
                <input id="newMaSo" type="text" placeholder="Nhập mã số" style="width:100%; padding:6px 8px; border:1px solid #ccc; border-radius:4px;">
            </div>
            <div style="flex:2; min-width:260px;">
                <label style="font-weight:bold; display:block; margin-bottom:4px;">Tên dịch vụ</label>
                <input id="newTenDichVu" type="text" placeholder="Nhập tên dịch vụ" style="width:100%; padding:6px 8px; border:1px solid #ccc; border-radius:4px;">
            </div>
            <div style="width:160px;">
                <label style="font-weight:bold; display:block; margin-bottom:4px;">Giá</label>
                <input id="newGia" type="number" min="0" step="1000" placeholder="Nhập giá" style="width:100%; padding:6px 8px; border:1px solid #ccc; border-radius:4px;">
            </div>
            <div>
                <button type="button" onclick="addNewPathology()" style="padding:8px 16px; min-height:44px; border:none; border-radius:6px; background:#880088; color:#fff; cursor:pointer;">Thêm mới</button>
            </div>
        </div>
        <div class="pathology-wrapper">
        <table id="pathologyTable" style="width:100%; border-collapse:collapse;">
            <thead>
                <tr>
                    <th style="width:5%; border:1px solid #ccc; padding:6px 8px;">STT</th>
                    <th style="width:20%; border:1px solid #ccc; padding:6px 8px;">Loại bệnh phẩm</th>
                    <th style="width:10%; border:1px solid #ccc; padding:6px 8px;">Mã số</th>
                    <th style="width:45%; border:1px solid #ccc; padding:6px 8px;">Tên dịch vụ</th>
                    <th style="width:15%; border:1px solid #ccc; padding:6px 8px; text-align:right;">Giá (VNĐ)</th>
                    <th style="width:10%; border:1px solid #ccc; padding:6px 8px;">Hành động</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        </div>
    `;

    const searchInput = document.getElementById('pathologySearch');
    if (searchInput) {
        searchInput.addEventListener('input', function () {
            renderPathologyTable(searchInput.value);
        });
    }

    renderPathologyTable();
}

function loadPathology() {
    const target = document.getElementById('pathologyBody');
    if (!target) return;

    // Ưu tiên load từ server (giống tab Mã ICD), fallback localStorage khi lỗi
    fetch('/api/pathology/export')
        .then(r => (r.ok ? r.json() : null))
        .then(serverData => {
            if (Array.isArray(serverData)) {
                pathoData = serverData;
                try {
                    localStorage.setItem(PATHOLOGY_STORAGE_KEY, JSON.stringify(pathoData));
                } catch (e) { console.warn('Không lưu pathology từ server vào localStorage:', e); }
            } else {
                // Server trả lỗi hoặc không phải mảng → thử localStorage
                try {
                    const raw = localStorage.getItem(PATHOLOGY_STORAGE_KEY);
                    if (raw) {
                        const parsed = JSON.parse(raw);
                        pathoData = Array.isArray(parsed) ? parsed : [];
                    } else {
                        pathoData = [];
                    }
                } catch (e) {
                    pathoData = [];
                }
            }
            buildPathologyUI(target);
            if (pathoData.length === 0) {
                const hint = document.createElement('p');
                hint.style.cssText = 'margin-bottom:12px; padding:10px; background:#f0f0f0; border-radius:6px; color:#555; font-size:0.95em;';
                hint.textContent = 'Chưa có dữ liệu. Dùng form bên dưới để thêm mới; dữ liệu sẽ tự động đồng bộ lên server.';
                const firstChild = target.querySelector('div');
                if (firstChild) target.insertBefore(hint, firstChild);
            }
        })
        .catch(err => {
            console.error(err);
            try {
                const raw = localStorage.getItem(PATHOLOGY_STORAGE_KEY);
                if (raw) {
                    const parsed = JSON.parse(raw);
                    pathoData = Array.isArray(parsed) ? parsed : [];
                } else {
                    pathoData = [];
                }
            } catch (e) {
                pathoData = [];
            }
            buildPathologyUI(target);
            const hint = document.createElement('p');
            hint.style.cssText = 'margin-bottom:12px; padding:10px; background:#fff3cd; border-radius:6px; color:#856404; font-size:0.95em;';
            hint.textContent = 'Không kết nối được server. Dùng dữ liệu từ bộ nhớ tạm; dữ liệu sẽ tự động đồng bộ lên server khi kết nối lại.';
            const firstChild = target.querySelector('div');
            if (firstChild) target.insertBefore(hint, firstChild);
        });
}

document.addEventListener('DOMContentLoaded', loadPathology);
</script>
</body>
</html>
